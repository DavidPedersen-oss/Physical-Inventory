<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Beach Property — CSULB Asset Inventory</title>
<meta name="description" content="CSULB Property Management asset lookup and physical inventory portal">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16160F">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ============ Tokens ============ */
:root{
  --gold:#FFB81C; --gold-deep:#8A6D00; --gold-soft:#FFF3D6;
  --rowH:42px; --radius:10px; --nav-h:60px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
}
[data-theme="light"]{
  --bg:#F4F4F1; --surface:#FFFFFF; --surface2:#FAFAF7; --ink:#1C1C17; --ink2:#5A5A50;
  --line:#E2E1D8; --line2:#D0CFC4; --accent:#8A6D00; --accent-fill:#FFB81C; --accent-soft:#FFF3D6;
  --ok:#2E7D32; --ok-bg:#E5F2E6; --bad:#C62828; --bad-bg:#FBE7E7; --warn:#9A6700; --warn-bg:#FFF1D6;
  --dmg:#7B2FA2; --dmg-bg:#F3E8FA; --oth:#4A6572; --oth-bg:#E8EEF1; --un:#6B6B60; --un-bg:#EDEDE7;
  --shadow:0 8px 28px rgba(28,28,23,.14); --header-bg:#16160F; --header-ink:#F4F2E8;
}
[data-theme="dark"]{
  --bg:#15150F; --surface:#1F1F18; --surface2:#262620; --ink:#ECEAE0; --ink2:#A5A395;
  --line:#33332A; --line2:#44443A; --accent:#FFC845; --accent-fill:#FFB81C; --accent-soft:#3A3115;
  --ok:#6BC974; --ok-bg:#1E3A21; --bad:#FF8A7E; --bad-bg:#46211F; --warn:#FFC257; --warn-bg:#413312;
  --dmg:#CE93E8; --dmg-bg:#371F44; --oth:#9FB6C1; --oth-bg:#23313A; --un:#8E8C7E; --un-bg:#2A2A22;
  --shadow:0 8px 28px rgba(0,0,0,.5); --header-bg:#0E0E09; --header-ink:#F4F2E8;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--ink);height:100%;overscroll-behavior-y:none;-webkit-tap-highlight-color:transparent}
button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink);background:var(--surface);border:1px solid var(--line2);border-radius:8px;padding:10px 12px;width:100%}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--accent-fill);outline-offset:1px}
::placeholder{color:var(--ink2)}
.mono{font-family:var(--mono)}
.muted{color:var(--ink2)}
.hidden{display:none!important}
a{color:var(--accent)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ============ Login ============ */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:
  linear-gradient(160deg,var(--header-bg) 0%, #25251A 100%);z-index:200;padding:20px}
.login-card{background:var(--surface);border-radius:16px;padding:34px 30px;width:100%;max-width:400px;box-shadow:var(--shadow)}
.brand-mark{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.brand-tag{font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.14em;background:var(--header-bg);color:var(--gold);
  padding:7px 10px;border-radius:6px;border-left:4px solid var(--gold)}
.login-card h1{font-size:22px;letter-spacing:-.01em;margin:14px 0 2px}
.login-card .sub{color:var(--ink2);font-size:13.5px;margin-bottom:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:9px;padding:11px 18px;font-weight:600;font-size:15px;
  background:var(--surface2);border:1px solid var(--line2);min-height:44px}
.btn:active{transform:translateY(1px)}
.btn-gold{background:var(--accent-fill);color:#16160F;border-color:transparent}
.btn-dark{background:var(--header-bg);color:var(--header-ink);border-color:transparent}
.btn-danger{background:var(--bad-bg);color:var(--bad);border-color:transparent}
.btn-block{width:100%}
.btn-sm{padding:7px 12px;font-size:13.5px;min-height:36px}
.btn[disabled]{opacity:.5;cursor:default}
.login-err{color:var(--bad);font-size:13.5px;margin-top:10px;min-height:18px}

/* ============ Shell ============ */
#app{display:none;height:100%}
#app.on{display:flex;flex-direction:column}
header.top{background:var(--header-bg);color:var(--header-ink);display:flex;align-items:center;gap:12px;
  padding:10px 14px;padding-top:max(10px,env(safe-area-inset-top));border-bottom:3px solid var(--gold);flex:none}
header.top .brand-tag{font-size:11px;padding:5px 8px;border:1px solid #3a3a2c;border-left:4px solid var(--gold)}
header.top .ttl{font-weight:700;font-size:15.5px;letter-spacing:.01em;white-space:nowrap}
header.top .grow{flex:1}
.sync-chip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:99px;
  background:#26261C;color:#CFCDBE;border:1px solid #3a3a2c;min-height:32px}
.sync-chip .dot{width:8px;height:8px;border-radius:50%;background:#777}
.sync-chip.ok .dot{background:var(--gold)} .sync-chip.pend .dot{background:#FF9A3C}
.sync-chip.err .dot{background:#FF6B5E} .sync-chip.busy .dot{background:#5EC1FF;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.3}}
.user-pill{font-size:12.5px;color:#CFCDBE;display:flex;align-items:center;gap:8px}
body.is-mobile .user-pill .uname{display:none}

.shell{display:flex;flex:1;min-height:0}
nav.side{width:212px;flex:none;background:var(--surface);border-right:1px solid var(--line);padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
nav.side .nav-it,nav.bottom .nav-it{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;font-weight:600;font-size:14px;color:var(--ink2);width:100%;text-align:left}
nav.side .nav-it svg{flex:none}
nav.side .nav-it.on{background:var(--accent-soft);color:var(--accent)}
nav.side .nav-sec{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);padding:14px 12px 5px}
nav.bottom{display:none}
main{flex:1;overflow-y:auto;min-width:0;padding:18px 22px 90px;-webkit-overflow-scrolling:touch}
.page-h{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.page-h h2{font-size:21px;letter-spacing:-.01em}
.page-h .cnt{color:var(--ink2);font-size:13.5px;font-weight:600}

/* Mobile shell */
@media(max-width:899px){
  nav.side{display:none}
  main{padding:14px 14px 110px}
  nav.bottom{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);
    padding-bottom:env(safe-area-inset-bottom);z-index:60}
  nav.bottom .nav-it{flex:1;flex-direction:column;gap:3px;font-size:10.5px;padding:9px 2px 7px;align-items:center;min-height:var(--nav-h)}
  nav.bottom .nav-it.on{color:var(--accent)}
  nav.bottom .nav-it.on svg{stroke:var(--accent)}
  header.top .ttl{display:none}
}

/* ============ Search ============ */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{padding:14px 44px 14px 46px;font-size:17px;border-radius:13px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.search-wrap .s-ico{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--ink2)}
.search-wrap .s-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);padding:8px;color:var(--ink2)}
.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{font-size:13px;font-weight:600;padding:7px 13px;border-radius:99px;border:1px solid var(--line2);background:var(--surface);color:var(--ink2);min-height:36px}
.chip.on{background:var(--header-bg);color:var(--gold);border-color:var(--header-bg)}

/* ============ Cards ============ */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 15px;margin-bottom:10px}
.acard{display:flex;gap:12px;align-items:flex-start}
.acard .ck{margin-top:4px}
.acard .body{flex:1;min-width:0;cursor:pointer}
.tagchip{font-family:var(--mono);font-weight:700;font-size:14.5px;letter-spacing:.03em;color:var(--ink);
  border-left:3px solid var(--gold);padding-left:8px}
.acard .desc{font-size:14.5px;margin:5px 0 7px;line-height:1.35}
.kv{font-size:12.5px;color:var(--ink2);display:flex;gap:5px 14px;flex-wrap:wrap}
.kv b{color:var(--ink);font-weight:600}
.acard .acts{display:flex;flex-direction:column;gap:7px;flex:none}
.qok{width:44px;height:44px;border-radius:10px;background:var(--ok-bg);color:var(--ok);font-weight:800;font-size:17px;border:1px solid transparent}
.qok.done{background:var(--ok);color:#fff}
.qmore{width:44px;height:44px;border-radius:10px;background:var(--surface2);border:1px solid var(--line2);color:var(--ink2);font-size:19px}
.stat-pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.02em}
.st-Unreviewed{background:var(--un-bg);color:var(--un)} .st-VerifiedOK{background:var(--ok-bg);color:var(--ok)}
.st-NotFound{background:var(--bad-bg);color:var(--bad)} .st-WrongLocation{background:var(--warn-bg);color:var(--warn)}
.st-Damaged{background:var(--dmg-bg);color:var(--dmg)} .st-Other{background:var(--oth-bg);color:var(--oth)}

/* ============ Departments ============ */
.div-h{display:flex;align-items:center;gap:10px;margin:20px 0 9px;font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.1em;color:var(--ink2)}
.div-h::after{content:"";flex:1;height:1px;background:var(--line2)}
.dept-row{display:flex;align-items:center;gap:13px;cursor:pointer}
.dept-row .nm{font-weight:600;font-size:15px}
.dept-row .sub{font-size:12px;color:var(--ink2);font-family:var(--mono);margin-top:2px}
.dept-row .right{margin-left:auto;text-align:right;flex:none}
.meter{height:7px;border-radius:99px;background:var(--un-bg);overflow:hidden;width:110px;margin-top:5px}
.meter>i{display:block;height:100%;background:var(--accent-fill);border-radius:99px}
.meter.full>i{background:var(--ok)}
.dept-row .pct{font-size:12.5px;font-weight:700;font-family:var(--mono)}

/* ============ Table ============ */
.tbl-tools{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:11px}
.tbl-tools input,.tbl-tools select{width:auto;font-size:14px;padding:8px 11px;min-height:40px}
.tbl-tools input[type=search]{flex:1;min-width:160px}
.vt{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
.vt-scroll{overflow:auto;max-height:calc(100vh - 245px);position:relative}
.vt-head,.vt-row{display:grid;align-items:center;min-width:max-content}
.vt-head{position:sticky;top:0;z-index:5;background:var(--surface2);border-bottom:2px solid var(--line2);font-size:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;color:var(--ink2)}
.vt-head .c{padding:10px 10px;cursor:pointer;user-select:none;white-space:nowrap;display:flex;gap:5px;align-items:center}
.vt-head .c.sorted{color:var(--accent)}
.vt-body{position:relative}
.vt-row{position:absolute;left:0;right:0;height:var(--rowH);border-bottom:1px solid var(--line);font-size:13.5px;cursor:pointer;min-width:max-content;background:var(--surface)}
.vt-row:hover{background:var(--surface2)}
.vt-row.sel{background:var(--accent-soft)}
.vt-row .c{padding:0 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vt .num{text-align:right;font-family:var(--mono);font-size:12.8px}
.vt .ck-c{width:42px;display:flex;justify-content:center}
input[type=checkbox]{width:19px;height:19px;accent-color:var(--accent-fill);flex:none}

/* Bulk bar */
.bulkbar{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:70;background:var(--header-bg);color:var(--header-ink);
  border-radius:14px;box-shadow:var(--shadow);display:flex;gap:7px;align-items:center;padding:9px 13px;flex-wrap:wrap;max-width:96vw;border:1px solid #3a3a2c}
@media(max-width:899px){.bulkbar{bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 12px)}}
.bulkbar .n{font-weight:800;color:var(--gold);font-family:var(--mono);font-size:14px;padding:0 4px}
.bulkbar .btn{background:#26261C;border-color:#3a3a2c;color:#E8E6D8;padding:8px 11px;font-size:12.5px;min-height:38px}

/* ============ Detail panel ============ */
.panel-veil{position:fixed;inset:0;background:rgba(10,10,5,.45);z-index:90;animation:fade .15s}
@keyframes fade{from{opacity:0}}
.panel{position:fixed;top:0;right:0;bottom:0;width:480px;max-width:100vw;background:var(--surface);z-index:95;box-shadow:var(--shadow);
  display:flex;flex-direction:column;animation:slidein .18s ease-out}
@keyframes slidein{from{transform:translateX(40px);opacity:0}}
@media(max-width:899px){.panel{width:100vw;animation:slideup .2s ease-out}@keyframes slideup{from{transform:translateY(60px);opacity:0}}}
.panel-h{padding:14px 18px;padding-top:max(14px,env(safe-area-inset-top));border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px;flex:none}
.panel-b{flex:1;overflow-y:auto;padding:16px 18px 28px}
.panel-f{flex:none;border-top:1px solid var(--line);padding:12px 18px;padding-bottom:max(12px,env(safe-area-inset-bottom));display:flex;gap:9px;background:var(--surface)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:6px 0 16px}
.stat-grid .sb{border:1.5px solid var(--line2);border-radius:9px;padding:10px 8px;font-weight:700;font-size:13.5px;text-align:center;min-height:44px;background:var(--surface)}
.stat-grid .sb.on.st-VerifiedOK{background:var(--ok);color:#fff;border-color:var(--ok)}
.stat-grid .sb.on.st-NotFound{background:var(--bad);color:#fff;border-color:var(--bad)}
.stat-grid .sb.on.st-WrongLocation{background:var(--warn);color:#fff;border-color:var(--warn)}
.stat-grid .sb.on.st-Damaged{background:var(--dmg);color:#fff;border-color:var(--dmg)}
.stat-grid .sb.on.st-Other{background:var(--oth);color:#fff;border-color:var(--oth)}
.stat-grid .sb.on.st-Unreviewed{background:var(--un);color:#fff;border-color:var(--un)}
.hist{font-size:12.5px;border-left:3px solid var(--line2);padding:2px 0 2px 12px;margin:8px 0;color:var(--ink2)}
.hist b{color:var(--ink)}
.ro-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px 14px;font-size:13px;margin-bottom:14px}
.ro-grid .lab{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink2);font-weight:700}

/* ============ Stats ============ */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:11px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px}
.kpi .v{font-family:var(--mono);font-size:25px;font-weight:700;letter-spacing:-.02em}
.kpi .l{font-size:12px;color:var(--ink2);font-weight:600;margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.kpi.gold{background:var(--header-bg);border-color:var(--header-bg)}
.kpi.gold .v{color:var(--gold)} .kpi.gold .l{color:#B9B7A6}
.hbar{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
.hbar .lb{width:120px;flex:none;font-weight:600}
.hbar .tr{flex:1;height:13px;background:var(--un-bg);border-radius:99px;overflow:hidden}
.hbar .tr>i{display:block;height:100%}
.hbar .n{font-family:var(--mono);font-size:12.5px;width:74px;text-align:right;flex:none}

/* ============ Forms/modals/toasts ============ */
.modal-veil{position:fixed;inset:0;background:rgba(10,10,5,.5);z-index:110;display:flex;align-items:center;justify-content:center;padding:18px}
.modal{background:var(--surface);border-radius:14px;max-width:480px;width:100%;padding:22px;box-shadow:var(--shadow);max-height:88vh;overflow-y:auto}
.modal h3{margin-bottom:8px;font-size:17px}
.modal .acts{display:flex;gap:9px;justify-content:flex-end;margin-top:18px}
#toasts{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:150;display:flex;flex-direction:column;gap:8px;width:min(420px,92vw)}
.toast{background:var(--header-bg);color:var(--header-ink);border-left:4px solid var(--gold);padding:12px 15px;border-radius:10px;
  font-size:13.5px;font-weight:600;box-shadow:var(--shadow);animation:fade .2s}
.toast.err{border-left-color:#FF6B5E}
.seg{display:inline-flex;border:1px solid var(--line2);border-radius:9px;overflow:hidden}
.seg button{padding:8px 14px;font-size:13px;font-weight:600;color:var(--ink2);min-height:38px;background:var(--surface)}
.seg button.on{background:var(--header-bg);color:var(--gold)}
.note{font-size:13px;color:var(--ink2);background:var(--surface2);border:1px solid var(--line);border-radius:9px;padding:11px 13px;line-height:1.45;margin:10px 0}
.code-box{font-family:var(--mono);font-size:12px;background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:10px;word-break:break-all;user-select:all}
.imp-row{display:grid;grid-template-columns:110px 1fr;gap:4px 12px;font-size:13px;padding:9px 0;border-bottom:1px solid var(--line)}
table.plain{border-collapse:collapse;width:100%;font-size:13px}
table.plain th,table.plain td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
table.plain th{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink2)}
.spin{width:18px;height:18px;border:2.5px solid var(--line2);border-top-color:var(--accent-fill);border-radius:50%;animation:rot .7s linear infinite;display:inline-block;vertical-align:-4px}
@keyframes rot{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="login-card">
    <div class="brand-mark"><span class="brand-tag">CSULB&nbsp;PM</span></div>
    <h1>Beach Property</h1>
    <div class="sub">Asset lookup &amp; physical inventory · FY 2025–26</div>
    <div id="loginForm">
      <div class="field"><label for="lgU">Username</label><input id="lgU" autocomplete="username" autocapitalize="none"></div>
      <div class="field"><label for="lgP">Password</label><input id="lgP" type="password" autocomplete="current-password"></div>
      <button class="btn btn-gold btn-block" id="lgGo">Sign in</button>
      <div class="login-err" id="lgErr"></div>
    </div>
    <div id="firstRun" class="hidden">
      <div class="note">No accounts exist yet on this device. Create the first <b>admin</b> account. You can push it to the SharePoint Users list later from the Users screen.</div>
      <div class="field"><label for="frU">Username</label><input id="frU" autocapitalize="none"></div>
      <div class="field"><label for="frN">Display name</label><input id="frN" placeholder="e.g. David R."></div>
      <div class="field"><label for="frP">Password</label><input id="frP" type="password"></div>
      <div class="field"><label for="frP2">Confirm password</label><input id="frP2" type="password"></div>
      <button class="btn btn-gold btn-block" id="frGo">Create admin account</button>
      <div class="login-err" id="frErr"></div>
    </div>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="app">
  <header class="top">
    <span class="brand-tag">CSULB&nbsp;PM</span>
    <span class="ttl">Beach Property · FY 25–26</span>
    <span class="grow"></span>
    <button class="sync-chip" id="syncChip" title="Sync status — tap to sync now"><span class="dot"></span><span id="syncTxt">Sync off</span></button>
    <span class="user-pill"><span class="uname" id="whoami"></span>
      <button class="btn btn-sm" id="logoutBtn" title="Sign out" style="background:#26261C;border-color:#3a3a2c;color:#CFCDBE">Sign out</button>
    </span>
  </header>

  <div class="shell">
    <nav class="side" id="sideNav"></nav>
    <main id="main"></main>
  </div>
  <nav class="bottom" id="botNav"></nav>
</div>

<div id="overlay"></div>
<div id="toasts"></div>

<script>
/* ================================================================
   Beach Property — CSULB asset inventory portal
   Static app · GitHub Pages · SharePoint via Power Automate
   ================================================================ */
'use strict';
/* ---------------- helpers ---------------- */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt$=n=>'$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const nowStr=()=>{const d=new Date(),p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`};
const debounce=(f,ms)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>f(...a),ms)}};
const STATUSES=['Verified OK','Not Found','Wrong Location','Damaged','Other'];
const stCls=s=>'st-'+String(s||'Unreviewed').replace(/\s/g,'');
const pill=s=>`<span class="stat-pill ${stCls(s)}">${esc(s||'Unreviewed')}</span>`;
function toast(msg,err){const t=document.createElement('div');t.className='toast'+(err?' err':'');t.textContent=msg;$('#toasts').append(t);setTimeout(()=>t.remove(),3400)}
function modal(html){const v=document.createElement('div');v.className='modal-veil';v.innerHTML=`<div class="modal">${html}</div>`;
  v.addEventListener('click',e=>{if(e.target===v)v.remove()});document.body.append(v);return v}
function confirmDlg(title,body,okLabel,danger){return new Promise(res=>{
  const v=modal(`<h3>${esc(title)}</h3><div class="muted" style="font-size:14px;line-height:1.5">${body}</div>
    <div class="acts"><button class="btn" data-x>Cancel</button><button class="btn ${danger?'btn-danger':'btn-gold'}" data-ok>${esc(okLabel||'Confirm')}</button></div>`);
  v.querySelector('[data-x]').onclick=()=>{v.remove();res(false)};
  v.querySelector('[data-ok]').onclick=()=>{v.remove();res(true)};})}

const ST={assets:new Map(),depts:[],deptMap:{},users:[],session:null,sel:new Set(),

/* ---------------- IndexedDB ---------------- */
let idb;
function dbOpen(){return new Promise((res,rej)=>{const r=indexedDB.open('beachprop',1);
  r.onupgradeneeded=()=>{const d=r.result;d.createObjectStore('kv');d.createObjectStore('assets',{keyPath:'id'});d.createObjectStore('queue',{keyPath:'qid',autoIncrement:true})};
  r.onsuccess=()=>{idb=r.result;res()};r.onerror=()=>rej(r.error)})}
const tx=(st,m)=>idb.transaction(st,m).objectStore(st);
const kvGet=k=>new Promise(r=>{const q=tx('kv').get(k);q.onsuccess=()=>r(q.result)});
const kvSet=(k,v)=>new Promise(r=>{const q=tx('kv','readwrite').put(v,k);q.onsuccess=()=>r()});
const dbAllAssets=()=>new Promise(r=>{const q=tx('assets').getAll();q.onsuccess=()=>r(q.result||[])});
const dbPutAsset=a=>new Promise(r=>{const q=tx('assets','readwrite').put(a);q.onsuccess=()=>r()});
function dbPutAssets(list){return new Promise(r=>{const t=idb.transaction('assets','readwrite'),s=t.objectStore('assets');list.forEach(a=>s.put(a));t.oncomplete=()=>r()})}
const dbClearAssets=()=>new Promise(r=>{const q=tx('assets','readwrite').clear();q.onsuccess=()=>r()});
const qAdd=op=>new Promise(r=>{const q=tx('queue','readwrite').add(op);q.onsuccess=()=>r(q.result)});
const qAll=()=>new Promise(r=>{const q=tx('queue').getAll();q.onsuccess=()=>r(q.result||[])});
const qPut=op=>new Promise(r=>{const q=tx('queue','readwrite').put(op);q.onsuccess=()=>r()});
const qDel=id=>new Promise(r=>{const q=tx('queue','readwrite').delete(id);q.onsuccess=()=>r()});

/* ---------------- crypto ---------------- */
const buf2hex=b=>[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
const hex2buf=h=>new Uint8Array((h.match(/../g)||[]).map(x=>parseInt(x,16)));
const randSalt=()=>buf2hex(crypto.getRandomValues(new Uint8Array(16)));
async function pbkdf2(pw,saltHex){
  const key=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveBits']);
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:hex2buf(saltHex),iterations:200000,hash:'SHA-256'},key,256);
  return buf2hex(bits)}

/* ---------------- boot ---------------- */
async function boot(){
  document.body.classList.toggle('is-mobile',matchMedia('(max-width:899px)').matches);
  await dbOpen();
  ST.theme=await kvGet('theme')|| (matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  document.documentElement.dataset.theme=ST.theme;
  ST.cfg=Object.assign(ST.cfg,await kvGet('cfg')||{});
  ST.users=await kvGet('users')||[];
  ST.lastSync=await kvGet('lastSync')||'';
  ST.syncLog=await kvGet('syncLog')||[];
  let assets=await dbAllAssets();
  ST.depts=await kvGet('depts')||[];
  if(!assets.length){
    try{
      const [a,d]=await Promise.all([fetch('seed/assets.json').then(r=>r.json()),fetch('seed/departments.json').then(r=>r.json())]);
      await dbPutAssets(a);await kvSet('depts',d);assets=a;ST.depts=d;
      toast(`Loaded ${a.length.toLocaleString()} seed assets`);
    }catch(e){console.warn('seed load failed',e)}
  }
  assets.forEach(a=>ST.assets.set(a.id,a));
  ST.depts.forEach(d=>ST.deptMap[d.deptId]=d);
  ST.pending=(await qAll()).filter(o=>!o.done).length;
  if(!window.crypto||!crypto.subtle){
    $('#lgErr').textContent='Secure sign-in needs HTTPS (or localhost). Open the GitHub Pages URL.';
    $('#lgGo').disabled=true;
  }
  const sess=await kvGet('session');
  const haveUsers=ST.users.length>0;
  if(!haveUsers){$('#loginForm').classList.add('hidden');$('#firstRun').classList.remove('hidden')}
  if(sess&&sess.exp>Date.now()&&(ST.users.find(u=>u.username===sess.u)||sess.local)){ST.session=sess;enterApp()}
}
async function doLogin(){
  const un=$('#lgU').value.trim().toLowerCase(),pw=$('#lgP').value;
  const u=ST.users.find(x=>x.username.toLowerCase()===un&&String(x.active).toLowerCase()!=='no'&&String(x.active).toLowerCase()!=='false');
  $('#lgErr').textContent='';
  if(!u){$('#lgErr').textContent='Unknown or inactive username.';return}
  $('#lgGo').disabled=true;$('#lgGo').innerHTML='<span class="spin"></span>';
  try{
    const h=await pbkdf2(pw,u.salt);
    if(h!==u.hash){$('#lgErr').textContent='Wrong password.';return}
    ST.session={u:u.username,name:u.display||u.username,role:u.role||'auditor',exp:Date.now()+12*3600*1000,local:!!u.local};
    await kvSet('session',ST.session);enterApp();
  }finally{$('#lgGo').disabled=false;$('#lgGo').textContent='Sign in'}
}
async function firstRunCreate(){
  const un=$('#frU').value.trim(),nm=$('#frN').value.trim(),p1=$('#frP').value,p2=$('#frP2').value;
  const err=$('#frErr');err.textContent='';
  if(!un||!p1){err.textContent='Username and password are required.';return}
  if(p1!==p2){err.textContent='Passwords do not match.';return}
  if(p1.length<8){err.textContent='Use at least 8 characters.';return}
  const salt=randSalt(),hash=await pbkdf2(p1,salt);
  ST.users.push({username:un,display:nm||un,role:'admin',salt,hash,active:'Yes',local:true});
  await kvSet('users',ST.users);
  ST.session={u:un,name:nm||un,role:'admin',exp:Date.now()+12*3600*1000,local:true};
  await kvSet('session',ST.session);enterApp();
}

/* ---------------- save + queue ---------------- */
function spShape(a){return{id:a.id,tag:a.tag,dept:a.dept,deptName:a.deptName,div:a.div,desc:a.desc,serial:a.serial,
  location:a.location,custodian:a.custodian,category:a.category,acqDate:a.acqDate,inServiceDt:a.inServiceDt,po:a.po,
  value:a.value,status:a.status,notes:a.notes,updatedBy:a.updatedBy,updatedAt:a.updatedAt,history:JSON.stringify(a.history||[])}}
async function saveAsset(a,changes,silent){
  a.updatedAt=nowStr();a.updatedBy=ST.session?ST.session.name:'?';
  (changes||[]).forEach(c=>{(a.history=a.history||[]).push({f:c.f,old:c.old,new:c.new,t:a.updatedAt,u:a.updatedBy})});
  ST.assets.set(a.id,a);await dbPutAsset(a);
  const ops=await qAll();
  const ex=ops.find(o=>!o.done&&o.kind==='upsert'&&o.payload.id===a.id);
  if(ex){ex.payload=spShape(a);await qPut(ex)}else{await qAdd({kind:'upsert',payload:spShape(a),t:nowStr()})}
  for(const c of (changes||[])){
    await qAdd({kind:'audit',payload:{AssetID:a.id,Field:c.f,OldValue:String(c.old??''),NewValue:String(c.new??''),
      Status:a.status,Timestamp:a.updatedAt,User:a.updatedBy},t:nowStr()});
  }
  ST.pending=(await qAll()).filter(o=>!o.done).length;
  syncChip();if(!silent)scheduleAutoSync();
}
let autoT;function scheduleAutoSync(){clearTimeout(autoT);if(ST.cfg.postUrl)autoT=setTimeout(()=>syncNow(true),4000)}

/* ---------------- sync engine ---------------- */
function syncChip(){
  const c=$('#syncChip'),t=$('#syncTxt');if(!c)return;
  c.className='sync-chip';
  if(ST.busy){c.classList.add('busy');t.textContent='Syncing…'}
  else if(!ST.cfg.postUrl){t.textContent='Sync off'}
  else if(ST.pending>0){c.classList.add('pend');t.textContent=ST.pending+' pending'}
  else{c.classList.add('ok');t.textContent=ST.lastSync?('Synced '+ST.lastSync.slice(5)):'Synced'}
}
async function logSync(entry){ST.syncLog.unshift({t:nowStr(),...entry});ST.syncLog=ST.syncLog.slice(0,30);await kvSet('syncLog',ST.syncLog)}
async function syncNow(silentOk){
  if(!ST.cfg.postUrl){location.hash='#/settings';toast('Set up sync in Settings first',1);return}
  if(ST.busy)return;ST.busy=true;syncChip();
  try{
    const ops=(await qAll()).filter(o=>!o.done);
    if(ops.length){
      for(let i=0;i<ops.length;i+=300){
        const batch=ops.slice(i,i+300);
        const body={key:ST.cfg.key,user:ST.session?ST.session.name:'?',
          assetUpserts:batch.filter(o=>o.kind==='upsert').map(o=>o.payload),
          auditLog:batch.filter(o=>o.kind==='audit').map(o=>o.payload),
          importLog:batch.filter(o=>o.kind==='import').map(o=>o.payload)};
        const r=await fetch(ST.cfg.postUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)});
        if(!r.ok)throw new Error('Write endpoint returned '+r.status);
        let j={};try{j=await r.json()}catch(e){}
        if(j.ok===false)throw new Error(j.error||'Flow reported failure');
        for(const o of batch){await qDel(o.qid)}
        await logSync({ok:true,msg:`Pushed ${batch.filter(o=>o.kind==='upsert').length} assets, ${batch.filter(o=>o.kind==='audit').length} audit rows`});
      }
    }
    ST.pending=0;
    if(ST.cfg.getUrl)await pullData();
    ST.lastSync=nowStr();await kvSet('lastSync',ST.lastSync);
    if(!silentOk)toast('Sync complete — all changes confirmed');
  }catch(e){
    await logSync({ok:false,msg:String(e.message||e)});
    toast('Sync failed: '+(e.message||e),1);
  }finally{
    ST.busy=false;ST.pending=(await qAll()).filter(o=>!o.done).length;syncChip();
  }
}
async function pullData(){
  const url=ST.cfg.getUrl+(ST.cfg.getUrl.includes('?')?'&':'?')+'k='+encodeURIComponent(ST.cfg.key);
  const r=await fetch(url);if(!r.ok)throw new Error('Read endpoint returned '+r.status);
  const j=await r.json();if(!j||j.ok===false)throw new Error('Read endpoint rejected the key');
  const pendingIds=new Set((await qAll()).filter(o=>!o.done&&o.kind==='upsert').map(o=>o.payload.id));
  let merged=0;
  if(Array.isArray(j.assets)){
    const put=[];
    for(const raw of j.assets){
      const id=String(raw.id??'').trim();if(!id||pendingIds.has(id))continue;
      let hist=[];try{hist=typeof raw.history==='string'?JSON.parse(raw.history||'[]'):(raw.history||[])}catch(e){}
      put.push({id,tag:raw.tag??'',dept:String(raw.dept??''),deptName:raw.deptName??'',div:raw.div??'',desc:raw.desc??'',
        serial:raw.serial??'',location:raw.location??'',custodian:raw.custodian??'',category:raw.category??'',
        acqDate:raw.acqDate??'',inServiceDt:raw.inServiceDt??'',po:raw.po??'',value:Number(raw.value)||0,
        status:raw.status||'Unreviewed',notes:raw.notes??'',updatedBy:raw.updatedBy??'',updatedAt:raw.updatedAt??'',history:hist});
    }
    put.forEach(a=>ST.assets.set(a.id,a));await dbPutAssets(put);merged=put.length;
  }
  if(Array.isArray(j.departments)&&j.departments.length){
    ST.depts=j.departments.map((d,i)=>({deptId:String(d.deptId??''),name:d.name??'',div:d.div??'',sortOrder:Number(d.sortOrder)||i+1,completed:String(d.completed).toLowerCase()==='true'||d.completed===true}));
    ST.deptMap={};ST.depts.forEach(d=>ST.deptMap[d.deptId]=d);await kvSet('depts',ST.depts);
  }
  if(Array.isArray(j.users)&&j.users.length){
    const locals=ST.users.filter(u=>u.local&&!j.users.some(s=>s.username===u.username));
    ST.users=j.users.map(u=>({username:u.username,display:u.display||u.username,role:u.role||'auditor',salt:u.salt,hash:u.hash,active:u.active??'Yes'})).concat(locals);
    await kvSet('users',ST.users);
  }
  await logSync({ok:true,msg:`Pulled ${merged} assets from SharePoint`});
  if(typeof render==='function')render();
}
async function testConnection(){
  if(!ST.cfg.getUrl){toast('Enter the Read flow URL first',1);return}
  try{const url=ST.cfg.getUrl+(ST.cfg.getUrl.includes('?')?'&':'?')+'k='+encodeURIComponent(ST.cfg.key)+'&ping=1';
    const r=await fetch(url);const j=await r.json();
    if(j&&j.ok!==false)toast('Connection OK — read endpoint reachable');else toast('Endpoint reachable but rejected the key',1);
  }catch(e){toast('Connection failed: '+(e.message||e),1)}
}

function deptPad(id){return String(id).padStart(5,'0')}

function bindListEvents(root){
  root.addEventListener('click',async e=>{
    const ok=e.target.closest('[data-qok]');
    if(ok){const a=ST.assets.get(ok.dataset.qok);if(!a)return;
      if(a.status!=='Verified OK'){await saveAsset(a,[{f:'status',old:a.status,new:'Verified OK'}].map(c=>(a.status='Verified OK',c)));ok.classList.add('done');
        const card=ok.closest('.acard');if(card)card.querySelector('.stat-pill').outerHTML=pill('Verified OK');toast(a.tag+' → Verified OK')}

    if(ck){ck.checked?ST.sel.add(ck.dataset.ck):ST.sel.delete(ck.dataset.ck);bulkBar();return}
    const op=e.target.closest('[data-open]');
    if(op){openAsset(op.dataset.open)}
  });
}

/* ---------------- search ---------------- */
const SCOPES=[['all','All fields'],['tag','Tag'],['id','Asset ID'],['serial','Serial'],['location','Location'],['custodian','Custodian'],['dept','Department']];
function searchAssets(q,scope){
  const toks=q.toLowerCase().split(/\s+/).filter(Boolean);if(!toks.length)return[];
  const hay=a=>{switch(scope){case'tag':return a.tag;case'id':return a.id;case'serial':return a.serial;case'location':return a.location;
    case'custodian':return a.custodian;case'dept':return a.dept+' '+a.deptName+' '+deptLabel(a.dept);
    default:return [a.tag,a.id,a.serial,a.desc,a.location,a.custodian,a.dept,deptLabel(a.dept),a.div,a.notes].join(' ')}};
  const out=[];
  for(const a of ST.assets.values()){
    const h=hay(a).toLowerCase();
    if(toks.every(t=>h.includes(t)))out.push(a);
  }
  const q0=toks[0];
  out.sort((x,y)=>{const xs=x.tag.toLowerCase().startsWith(q0)?0:1,ys=y.tag.toLowerCase().startsWith(q0)?0:1;
    return xs-ys||x.tag.localeCompare(y.tag)});
  return out;
}
function renderSearch(m){
  m.innerHTML=`<div class="page-h"><h2>Asset lookup</h2><span class="cnt">${ST.assets.size.toLocaleString()} assets on record</span></div>
  <div class="search-wrap"><span class="s-ico">${I.search}</span>
    <input id="gq" type="search" placeholder="Tag, serial, description, location, custodian…" value="${esc(ST.q)}" autocomplete="off">
    <button class="s-clear ${ST.q?'':'hidden'}" id="gqClear">✕</button></div>
  <div class="chip-row">${SCOPES.map(([k,l])=>`<button class="chip ${ST.scope===k?'on':''}" data-scope="${k}">${l}</button>`).join('')}</div>
  <div id="sres"></div>`;
  const run=()=>{
    ST.q=$('#gq').value;$('#gqClear').classList.toggle('hidden',!ST.q);
    const box=$('#sres');
    if(ST.q.trim().length<2){box.innerHTML=`<div class="note">Type at least 2 characters. Tip: scan-read a property tag and type the last 4–5 digits.</div>`;return}
    const res=searchAssets(ST.q,ST.scope),max=80;
    box.innerHTML=`<div class="muted" style="font-size:13px;margin-bottom:9px">${res.length.toLocaleString()} match${res.length===1?'':'es'}${res.length>max?' · showing first '+max:''}</div>`
      +res.slice(0,max).map(a=>assetCard(a)).join('');
  };
  $('#gq').addEventListener('input',debounce(run,160));
  $('#gqClear').onclick=()=>{$('#gq').value='';run();$('#gq').focus()};
  m.querySelectorAll('[data-scope]').forEach(b=>b.onclick=()=>{ST.scope=b.dataset.scope;renderSearch(m);$('#gq').focus()});

/* ---------------- virtual table ---------------- */
const COLS=[
 {k:'tag',l:'Tag',w:104,cls:'mono'},
 {k:'id',l:'Asset ID',w:84,cls:'mono num'},
 {k:'desc',l:'Description',w:280},
 {k:'serial',l:'Serial',w:150,cls:'mono'},
 {k:'dept',l:'Dept',w:70,cls:'mono num'},
 {k:'deptName',l:'Department name',w:190},
 {k:'div',l:'Div/Org',w:96,cls:'mono'},
 {k:'location',l:'Location',w:120},
 {k:'custodian',l:'Custodian',w:160},
 {k:'acqDate',l:'Acq date',w:100,date:1},
 {k:'inServiceDt',l:'In service',w:100,date:1},
 {k:'value',l:'Value',w:110,cls:'num',num:1,fmt:v=>fmt$(v)},
 {k:'status',l:'Status',w:130,fmt:v=>pill(v)},
 {k:'notes',l:'Notes',w:200},
 {k:'updatedAt',l:'Last updated',w:130,cls:'mono'},
 {k:'updatedBy',l:'Updated by',w:120}];
function cmp(a,b,c){
  let x=a[c.k],y=b[c.k];
  if(c.num){x=Number(x)||0;y=Number(y)||0;return x-y}
  if(c.date){x=x?new Date(x).getTime()||0:0;y=y?new Date(y).getTime()||0:0;return x-y}
  if(c.k==='id'||c.k==='dept')return (Number(x)||0)-(Number(y)||0);
  return String(x??'').localeCompare(String(y??''))}
function vTable(box,rows,opts={}){
  const cols=opts.compact?COLS.filter(c=>['tag','desc','serial','location','custodian','value','status','notes'].includes(c.k)):COLS;
  const sorted=[...rows].sort((a,b)=>cmp(a,b,COLS.find(c=>c.k===ST.sort.k)||COLS[0])*ST.sort.dir);
  const grid=`42px ${cols.map(c=>c.w+'px').join(' ')}`;
  const rowH=42;
  box.innerHTML=`<div class="vt"><div class="vt-scroll" id="vsc">
    <div class="vt-head" style="grid-template-columns:${grid}">
      <div class="c ck-c"><input type="checkbox" id="vAll" title="Select all shown"></div>
      ${cols.map(c=>`<div class="c ${ST.sort.k===c.k?'sorted':''}" data-sort="${c.k}">${c.l}${ST.sort.k===c.k?(ST.sort.dir>0?' ▲':' ▼'):''}</div>`).join('')}
    </div>
    <div class="vt-body" id="vbody" style="height:${sorted.length*rowH}px"></div>
  </div>
  <div style="padding:8px 12px;font-size:12.5px" class="muted">${sorted.length.toLocaleString()} rows · click a column to sort · click a row to open</div></div>`;
  const sc=$('#vsc'),body=$('#vbody');
  function paint(){
    const top=sc.scrollTop,first=Math.max(0,Math.floor(top/rowH)-6),last=Math.min(sorted.length,first+Math.ceil(sc.clientHeight/rowH)+12);
    let h='';
    for(let i=first;i<last;i++){const a=sorted[i];
      h+=`<div class="vt-row ${ST.sel.has(a.id)?'sel':''}" data-open="${esc(a.id)}" style="top:${i*rowH}px;grid-template-columns:${grid}">
        <div class="c ck-c"><input type="checkbox" data-ck="${esc(a.id)}" ${ST.sel.has(a.id)?'checked':''}></div>
        ${cols.map(c=>`<div class="c ${c.cls||''}" title="${esc(a[c.k])}">${c.fmt?c.fmt(a[c.k]):esc(a[c.k])}</div>`).join('')}</div>`;
    }
    body.innerHTML=h;
  }
  sc.addEventListener('scroll',()=>requestAnimationFrame(paint));paint();
  box.querySelector('.vt-head').addEventListener('click',e=>{
    const s=e.target.closest('[data-sort]');if(!s)return;
    const k=s.dataset.sort;ST.sort=ST.sort.k===k?{k,dir:-ST.sort.dir}:{k,dir:1};
    if(opts.rerender)opts.rerender();else vTable(box,rows,opts)});
  $('#vAll').onchange=e=>{sorted.forEach(a=>e.target.checked?ST.sel.add(a.id):ST.sel.delete(a.id));paint();bulkBar()};
  body.addEventListener('click',e=>{
    const ck=e.target.closest('[data-ck]');
    if(ck){ck.checked?ST.sel.add(ck.dataset.ck):ST.sel.delete(ck.dataset.ck);ck.closest('.vt-row').classList.toggle('sel',ck.checked);bulkBar();e.stopPropagation();return}
    const r=e.target.closest('[data-open]');if(r)openAsset(r.dataset.open)});
}

function normalizeRows(rows){
  // map arbitrary headers -> our schema; group by Asset ID; sum value
  const byId=new Map();let skipped=0;
  for(const r of rows){
    const o={};
    for(const k in r){const mk=IMP_MAAP_safe(k);if(mk)o[mk]=r[k]}
    const id=String(o.id??'').replace(/\.0$/,'').trim();
    if(!id||!/^\d+$/.test(id)){skipped++;continue}
    const clean=v=>{const s=String(v??'').trim();return /^(nan|nat|none|null)$/i.test(s)?'':s};
    const val=parseFloat(String(o.value??'0').replace(/[$,]/g,''))||0;
    if(byId.has(id)){byId.get(id).value+=val;continue}
    byId.set(id,{id,tag:clean(o.tag),dept:String(parseInt(o.dept)||'').trim(),desc:clean(o.desc),serial:clean(o.serial),
      location:clean(o.location),custodian:clean(o.custodian),category:clean(o.category),acqDate:clean(o.acqDate),
      inServiceDt:clean(o.inServiceDt),po:clean(o.po).replace(/\.0$/,''),value:val,status:clean(o.status),notes:clean(o.notes)});
  }
  return{rows:[...byId.values()],skipped};
}
function IMP_MAAP_safe(k){return IMP_MAP[String(k||'').trim().toLowerCase()]}
const CMP_FIELDS=['tag','dept','desc','serial','location','custodian','category','acqDate','inServiceDt','po','value'];
function diffImport(incoming){
  const news=[],updates=[],conflicts=[],unchanged=[];
  for(const r of incoming){
    const ex=ST.assets.get(r.id);
    if(!ex){news.push(r);continue}
    const ch=[],cf=[];
    for(const f of CMP_FIELDS){
      const nv=f==='value'?Number(r[f])||0:String(r[f]??''),ov=f==='value'?Number(ex[f])||0:String(ex[f]??'');
      if(f!=='value'&&!String(r[f]??'').length)continue; // don't blank fields from sparse files
      if(String(nv)!==String(ov)){
        const audited=(ex.history||[]).some(h=>h.f===f);
        (audited?cf:ch).push({f,old:ov,new:nv});
      }
    }
    if(cf.length)conflicts.push({asset:ex,ch,cf});
    else if(ch.length)updates.push({asset:ex,ch});
    else unchanged.push(ex);
  }
  return{news,updates,conflicts,unchanged};
}
function renderImport(m){
  m.innerHTML=`<div class="page-h"><h2>Import asset data</h2></div>
  <div class="note">Upload a fresh PeopleSoft asset query (CSV or Excel) — or a previous export from this app. Rows are matched by <b>Asset ID</b>; multiple cost rows for one asset are merged with summed value. Quoted commas (e.g. <span class="mono">"Last, First"</span>) are handled correctly. Nothing changes until you review the preview and apply.</div>
  <div class="card" style="text-align:center;padding:26px">
    <input type="file" id="impFile" accept=".csv,.xlsx,.xls" class="hidden">
    <button class="btn btn-gold" id="impPick">Choose file…</button>
    <div class="muted" style="font-size:12.5px;margin-top:9px">.csv · .xlsx · .xls</div></div>
  <div id="impOut"></div>`;
  $('#impPick').onclick=()=>$('#impFile').click();
  $('#impFile').onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    $('#impOut').innerHTML='<div class="card"><span class="spin"></span> Reading '+esc(file.name)+'…</div>';
    try{
      let rows;
      if(/\.csv$/i.test(file.name)){
        rows=await new Promise((res,rej)=>Papa.parse(file,{header:true,skipEmptyLines:true,complete:r=>res(r.data),error:rej}));
      }else{
        const buf=await file.arrayBuffer();const wb=XLSX.read(buf,{type:'array'});
        rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{raw:false,defval:''});
        if(rows.length&&!Object.keys(rows[0]).some(k=>IMP_MAAP_safe(k))){ // merged header row on row 0 (PeopleSoft XLS)
          rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{raw:false,defval:'',range:1});
        }
      }
      if(!rows.length||!Object.keys(rows[0]).some(k=>IMP_MAAP_safe(k)))throw new Error('Could not find expected columns (need at least "Asset ID").');
      const{rows:inc,skipped}=normalizeRows(rows);
      const d=diffImport(inc);
      previewImport(d,file.name,inc.length,skipped);
    }catch(err){$('#impOut').innerHTML=`<div class="note" style="border-color:var(--bad);color:var(--bad)">Import failed: ${esc(err.message||err)}</div>`}
    e.target.value='';
  };
}
function previewImport(d,fname,total,skipped){
  const box=$('#impOut');
  const chRow=u=>`<div class="imp-row"><span class="mono">${esc(u.asset.tag||u.asset.id)}</span><span>${u.ch.concat(u.cf||[]).map(c=>`<b>${esc(c.f)}</b>: ${esc(c.old)||'<i>blank</i>'} → ${esc(c.new)}`).join(' · ')}</span></div>`;
  box.innerHTML=`<div class="card"><b>${esc(fname)}</b> — ${total.toLocaleString()} unique assets read${skipped?` · ${skipped} rows skipped (no Asset ID)`:''}
    <table class="plain" style="margin-top:10px">
      <tr><th></th><th>Count</th><th>Apply?</th></tr>
      <tr><td>Field updates</td><td>${d.updates.length}</td><td><input type="checkbox" id="apU" ${d.updates.length?'checked':'disabled'}></td></tr>
      <tr><td>New assets</td><td>${d.news.length}</td><td><input type="checkbox" id="apN" ${d.news.length?'checked':'disabled'}></td></tr>
      <tr><td>Conflicts <span class="muted">(field already edited by an auditor)</span></td><td>${d.conflicts.length}</td><td><input type="checkbox" id="apC" ${d.conflicts.length?'':'disabled'}> <span class="muted" style="font-size:11.5px">overwrite</span></td></tr>
      <tr><td>Unchanged</td><td>${d.unchanged.length}</td><td>—</td></tr>
    </table>
    <div class="acts" style="display:flex;justify-content:flex-end;margin-top:14px"><button class="btn btn-gold" id="apGo">Apply import</button></div></div>
  ${d.updates.length?`<div class="card"><b style="font-size:14px">Updates (first 25)</b>${d.updates.slice(0,25).map(chRow).join('')}</div>`:''}
  ${d.conflicts.length?`<div class="card" style="border-color:var(--warn)"><b style="font-size:14px;color:var(--warn)">Conflicts (first 25)</b>${d.conflicts.slice(0,25).map(chRow).join('')}</div>`:''}
  ${d.news.length?`<div class="card"><b style="font-size:14px">New assets (first 25)</b>${d.news.slice(0,25).map(r=>`<div class="imp-row"><span class="mono">${esc(r.tag||r.id)}</span><span>${esc(r.desc)} · ${esc(deptLabel(r.dept))}</span></div>`).join('')}</div>`:''}`;
  $('#apGo').onclick=async()=>{
    const doU=$('#apU').checked,doN=$('#apN').checked,doC=$('#apC').checked;
    let nU=0,nN=0,nC=0;const who='Import: '+fname;
    if(doU)for(const u of d.updates){u.ch.forEach(c=>u.asset[c.f]=c.f==='value'?Number(c.new):c.new);await saveAsset(u.asset,u.ch,true);nU++}
    if(doC)for(const u of d.conflicts){const all=u.ch.concat(u.cf);all.forEach(c=>u.asset[c.f]=c.f==='value'?Number(c.new):c.new);await saveAsset(u.asset,all,true);nC++}
    if(doN)for(const r of d.news){
      const dd=ST.deptMap[r.dept]||{};
      const a={...r,deptName:dd.name||'',div:dd.div||'',status:r.status||'Unreviewed',notes:r.notes||'',updatedBy:'',updatedAt:'',history:[]};
      await saveAsset(a,[{f:'created',old:'',new:'via '+fname}],true);nN++;
    }
    await qAdd({kind:'import',payload:{Timestamp:nowStr(),User:ST.session.name,Filename:fname,RowsMatched:nU+nC,RowsAdded:nN,RowsConflicted:d.conflicts.length,
      Summary:JSON.stringify({updates:nU,news:nN,conflictsApplied:nC,unchanged:d.unchanged.length})},t:nowStr()});
    ST.pending=(await qAll()).filter(o=>!o.done).length;syncChip();scheduleAutoSync();
    toast(`Import applied — ${nU+nC} updated, ${nN} added`);
    location.hash='#/stats';
  };
}

/* ---------------- export ---------------- */
function originalOf(a,f){const h=(a.history||[]).find(x=>x.f===f);return h?String(h.old??''):''}
function exportRows(changedOnly){
  let list=[...ST.assets.values()];
  if(changedOnly)list=list.filter(a=>a.status!=='Unreviewed'||(a.history||[]).length);
  list.sort((a,b)=>(Number(a.dept)||0)-(Number(b.dept)||0)||a.tag.localeCompare(b.tag));
  return list.map(a=>({'Asset ID':a.id,'Property Tag':a.tag,'Original Tag':originalOf(a,'tag'),'Description':a.desc,
    'Serial ID':a.serial,'Original Serial':originalOf(a,'serial'),'Dept ID':deptPad(a.dept),'Department Name':a.deptName||deptLabel(a.dept),
    'Division/Org':a.div,'Location':a.location,'Original Location':originalOf(a,'location'),'Custodian':a.custodian,
    'Original Custodian':originalOf(a,'custodian'),'Category':a.category,'Acq Date':a.acqDate,'In Service Dt':a.inServiceDt,
    'PO No':a.po,'Value':a.value,'Status':a.status,'Notes':a.notes,'Updated By':a.updatedBy,'Last Updated':a.updatedAt,
    'Edit History':(a.history||[]).map(h=>`[${h.t}] ${h.u}: ${h.f} "${h.old??''}" -> "${h.new??''}"`).join(' | ')}));
}
function dl(blob,name){const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),4000)}
function renderExport(m){
  const edited=[...ST.assets.values()].filter(a=>a.status!=='Unreviewed'||(a.history||[]).length).length;
  m.innerHTML=`<div class="page-h"><h2>Export audit results</h2></div>
  <div class="note">Exports include original + updated field values, status, notes, full edit history, Updated By and Last Updated. All fields are quoted so commas in names never break the file. Ready for PeopleSoft / Property reconciliation.</div>
  <div class="card">
    <label style="display:flex;gap:10px;align-items:center;font-weight:600;font-size:14.5px"><input type="checkbox" id="exCh" checked>
      Changed &amp; reviewed assets only (${edited.toLocaleString()}) — uncheck for all ${ST.assets.size.toLocaleString()}</label>
    <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
      <button class="btn btn-gold" id="exCsv">Download CSV</button>
      <button class="btn btn-dark" id="exXlsx">Download Excel (.xlsx)</button>
      <button class="btn" id="exBak">Backup everything (JSON)</button></div></div>`;
  $('#exCsv').onclick=()=>{const rows=exportRows($('#exCh').checked);
    const csv=Papa.unparse(rows,{quotes:true});
    dl(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}),'PI_FY25-26_Audit_Results.csv');toast(rows.length+' rows exported')};
  $('#exXlsx').onclick=()=>{const rows=exportRows($('#exCh').checked);
    const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Audit Results');
    XLSX.writeFile(wb,'PI_FY25-26_Audit_Results.xlsx');toast(rows.length+' rows exported')};
  $('#exBak').onclick=()=>{dl(new Blob([JSON.stringify({assets:[...ST.assets.values()],depts:ST.depts,exported:nowStr()})],
    {type:'application/json'}),'beachprop-backup-'+nowStr().replace(/[: ]/g,'-')+'.json');toast('Backup downloaded')};
}

/* ---------------- users ---------------- */
function renderUsers(m){
  const admin=ST.session.role==='admin';
  m.innerHTML=`<div class="page-h"><h2>Users</h2></div>
  <div class="card"><table class="plain"><tr><th>Username</th><th>Name</th><th>Role</th><th>Source</th></tr>
    ${ST.users.map(u=>`<tr><td class="mono">${esc(u.username)}</td><td>${esc(u.display)}</td><td>${esc(u.role)}</td>
      <td class="muted">${u.local?'this device only':'SharePoint'}</td></tr>`).join('')}</table></div>
  ${admin?`<div class="card"><b style="font-size:15px">Add a user</b>
    <div class="note">This generates the salted password hash. Add the row to the <b>Users</b> SharePoint list and every device will pick it up on next sync. Passwords are never stored — only the hash.</div>
    <div class="field"><label>Username</label><input id="nuU" autocapitalize="none"></div>
    <div class="field"><label>Display name</label><input id="nuN"></div>
    <div class="field"><label>Role</label><select id="nuR"><option value="auditor">auditor</option><option value="admin">admin</option></select></div>
    <div class="field"><label>Password</label><input id="nuP" type="text" class="mono"></div>
    <button class="btn btn-gold" id="nuGo">Generate user row</button>
    <div id="nuOut"></div></div>`:'<div class="note">Only admins can add users.</div>'}`;
  if(admin)$('#nuGo').onclick=async()=>{
    const un=$('#nuU').value.trim(),nm=$('#nuN').value.trim(),role=$('#nuR').value,pw=$('#nuP').value;
    if(!un||pw.length<8){toast('Username required; password ≥ 8 characters',1);return}
    const salt=randSalt(),hash=await pbkdf2(pw,salt);
    ST.users=ST.users.filter(u=>u.username!==un);
    ST.users.push({username:un,display:nm||un,role,salt,hash,active:'Yes',local:true});
    await kvSet('users',ST.users);
    $('#nuOut').innerHTML=`<div class="note" style="margin-top:14px"><b>Paste into the SharePoint Users list:</b></div>
      <div class="code-box">Title (username): ${esc(un)}\nDisplayName: ${esc(nm||un)}\nRole: ${esc(role)}\nSalt: ${salt}\nPasswordHash: ${hash}\nActive: Yes</div>
      <button class="btn btn-sm" style="margin-top:9px" onclick="navigator.clipboard.writeText('${esc(un)}\\t${esc(nm||un)}\\t${esc(role)}\\t${salt}\\t${hash}\\tYes').then(()=>toast('Copied as tab-separated row'))">Copy row</button>`;
    toast('User added on this device + row generated');
  };
}

  m.innerHTML=`<div class="page-h"><h2>Settings</h2></div>
  <div class="card"><b style="font-size:15px">Appearance</b><div style="margin-top:11px">
    <span class="seg"><button data-th="light" class="${ST.theme==='light'?'on':''}">Light</button><button data-th="dark" class="${ST.theme==='dark'?'on':''}">Dark</button></span></div></div>
  <div class="card"><b style="font-size:15px">SharePoint sync (Power Automate)</b>
    <div class="note">Paste the two flow URLs from Power Automate and the shared key set inside the flows. These are saved on this device only — never in the GitHub repo. See the README for flow setup.</div>
    <div class="field"><label>Read flow URL (GET)</label><input id="cgU" class="mono" style="font-size:12px" value="${esc(ST.cfg.getUrl)}" placeholder="https://prod-…logic.azure.com…"></div>
    <div class="field"><label>Write flow URL (POST)</label><input id="cpU" class="mono" style="font-size:12px" value="${esc(ST.cfg.postUrl)}"></div>
    <div class="field"><label>Shared key</label><input id="ckY" class="mono" value="${esc(ST.cfg.key)}"></div>
    <div style="display:flex;gap:9px;flex-wrap:wrap">
      <button class="btn btn-gold" id="cfSave">Save</button>
      <button class="btn" id="cfTest">Test connection</button>
      <button class="btn btn-dark" id="cfSync">Sync now (${ST.pending} pending)</button></div>
    <div style="display:flex;gap:9px;flex-wrap:wrap;margin-top:9px">
      <button class="btn btn-sm" id="cfShare">Copy config code</button>
      <button class="btn btn-sm" id="cfPaste">Paste config code</button></div></div>
  <div class="card"><b style="font-size:15px">Sync log</b>
    ${ST.syncLog.length?ST.syncLog.slice(0,12).map(l=>`<div class="hist" style="border-color:${l.ok?'var(--ok)':'var(--bad)'}">
      <b>${l.ok?'OK':'FAILED'}</b> · ${esc(l.t)}<br>${esc(l.msg)}</div>`).join(''):'<div class="muted" style="font-size:13px;margin-top:8px">No syncs yet.</div>'}</div>
  <div class="card"><b style="font-size:15px">Data</b>
    <div style="display:flex;gap:9px;flex-wrap:wrap;margin-top:12px">
      <button class="btn" id="dataPull">Pull latest from SharePoint</button>
      <button class="btn btn-danger" id="dataReset">Reset this device</button></div>
    <div class="muted" style="font-size:12.5px;margin-top:9px">Reset wipes local data and reloads seed files — unsynced changes are lost.</div></div>
  <div class="muted" style="font-size:12px;text-align:center;margin-top:10px">Beach Property · CSULB Property Management Office · build 1.0</div>`;
  m.querySelectorAll('[data-th]').forEach(b=>b.onclick=async()=>{ST.theme=b.dataset.th;document.documentElement.dataset.theme=ST.theme;await kvSet('theme',ST.theme);renderSettings(m)});
  $('#cfSave').onclick=async()=>{ST.cfg={getUrl:$('#cgU').value.trim(),postUrl:$('#cpU').value.trim(),key:$('#ckY').value.trim()};
    await kvSet('cfg',ST.cfg);syncChip();toast('Sync settings saved')};
  $('#cfTest').onclick=()=>{ST.cfg.getUrl=$('#cgU').value.trim();ST.cfg.key=$('#ckY').value.trim();testConnection()};
  $('#cfSync').onclick=()=>syncNow();
  $('#cfShare').onclick=()=>{navigator.clipboard.writeText(btoa(JSON.stringify(ST.cfg))).then(()=>toast('Config code copied — paste it on another device'))};
  $('#cfPaste').onclick=async()=>{
    const v=modal(`<h3>Paste config code</h3><textarea id="ccIn" rows="4" class="mono" style="font-size:12px"></textarea>
      <div class="acts"><button class="btn" data-x>Cancel</button><button class="btn btn-gold" data-ok>Apply</button></div>`);
    v.querySelector('[data-x]').onclick=()=>v.remove();
    v.querySelector('[data-ok]').onclick=async()=>{
      try{ST.cfg=JSON.parse(atob(v.querySelector('#ccIn').value.trim()));await kvSet('cfg',ST.cfg);v.remove();renderSettings(m);syncChip();toast('Config applied')}

  $('#dataPull').onclick=async()=>{if(!ST.cfg.getUrl){toast('Set the Read flow URL first',1);return}

  $('#dataReset').onclick=async()=>{
    if(await confirmDlg('Reset this device','All local data, pending changes, and sign-in info on this device will be erased and seed data reloaded. SharePoint is not touched.','Erase and reload',true)){
