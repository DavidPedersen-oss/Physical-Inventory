<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PI Audit">
<title>CSULB Physical Inventory · FY 25-26</title>
<style>
:root {
  --bg:        #0f172a;
  --bg2:       #1e293b;
  --bg3:       #334155;
  --border:    #334155;
  --text:      #e2e8f0;
  --text2:     #94a3b8;
  --text3:     #64748b;
  --text4:     #475569;
  --accent:    #0ea5e9;
  --accent2:   #38bdf8;
  --brand:     #003087;
  --green:     #22c55e;
  --green2:    #4ade80;
  --amber:     #fbbf24;
  --red:       #ef4444;
  --orange:    #f97316;
  --purple:    #8b5cf6;
  --sidebar-w: 280px;
  --header-h:  56px;
}
[data-theme="light"] {
  --bg:        #f8fafc;
  --bg2:       #ffffff;
  --bg3:       #e2e8f0;
  --border:    #e2e8f0;
  --text:      #0f172a;
  --text2:     #334155;
  --text3:     #64748b;
  --text4:     #94a3b8;
  --accent:    #0284c7;
  --accent2:   #0369a1;
  --brand:     #003087;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,'Inter',system-ui,sans-serif; font-size:14px; }
input,textarea,button,select { font-family:inherit; color:inherit; }
textarea { resize:vertical; }
a { color:var(--accent); }
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ── LAYOUT ── */
#shell { display:flex; height:100vh; overflow:hidden; }

/* Sidebar */
#sidebar {
  width:var(--sidebar-w); flex-shrink:0;
  background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  transition:transform .25s ease;
  z-index:30;
}
#sidebar-header {
  height:var(--header-h); display:flex; align-items:center; gap:10px;
  padding:0 16px; border-bottom:1px solid var(--border); flex-shrink:0;
}
#dept-list-wrap { flex:1; overflow-y:auto; padding:8px 8px 16px; }
#sidebar-footer { padding:10px 12px; border-top:1px solid var(--border); display:flex; gap:6px; flex-shrink:0; }

/* Main */
#main { flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }
#topbar {
  height:var(--header-h); background:var(--bg2); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px; padding:0 16px; flex-shrink:0;
}
#content { flex:1; overflow-y:auto; }
#content-inner { max-width:900px; margin:0 auto; padding:16px; }

/* Mobile */
@media (max-width:768px) {
  #sidebar {
    position:fixed; left:0; top:0; bottom:0;
    transform:translateX(-100%);
    box-shadow:4px 0 24px rgba(0,0,0,.4);
  }
  #sidebar.open { transform:translateX(0); }
  #sidebar-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:29;
  }
  #sidebar-overlay.open { display:block; }
  #menu-btn { display:flex !important; }
  #content-inner { padding:12px; }
}
@media (min-width:769px) {
  #menu-btn { display:none !important; }
}

/* ── COMPONENTS ── */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:7px 14px; border-radius:7px; border:1px solid var(--border);
  background:transparent; cursor:pointer; font-size:13px; font-weight:600;
  color:var(--text2); transition:background .12s, color .12s, border-color .12s;
  white-space:nowrap;
}
.btn:hover { background:var(--bg3); color:var(--text); }
.btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn.primary:hover { filter:brightness(1.1); }
.btn.ghost { border-color:transparent; }
.btn.ghost:hover { background:var(--bg3); }
.btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn.sm { padding:4px 10px; font-size:11px; border-radius:5px; }
.btn.icon { padding:7px; }

.card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:10px; overflow:hidden;
}
.card-body { padding:14px 16px; }

.badge {
  display:inline-block; padding:2px 8px; border-radius:20px;
  font-size:11px; font-weight:700;
}

.input {
  width:100%; padding:9px 12px; border-radius:7px;
  border:1px solid var(--border); background:var(--bg);
  color:var(--text); font-size:14px; outline:none;
  transition:border-color .15s;
}
.input:focus { border-color:var(--accent); }

.label {
  font-size:10px; color:var(--text3); text-transform:uppercase;
  letter-spacing:.5px; margin-bottom:4px; display:block; font-weight:600;
}

/* ── PROGRESS BAR ── */
.pbar-wrap { height:4px; background:var(--bg3); border-radius:2px; overflow:hidden; }
.pbar-fill  { height:4px; border-radius:2px; transition:width .4s; }

/* ── DEPT CARDS (sidebar) ── */
.dept-item {
  display:flex; align-items:center; gap:8px;
  padding:8px 10px; border-radius:8px; cursor:pointer;
  transition:background .12s; border:none; background:transparent;
  width:100%; text-align:left; color:var(--text);
}
.dept-item:hover { background:var(--bg3); }
.dept-item.active { background:var(--accent)18; }
.dept-item .dept-id-badge {
  font-size:9px; color:var(--text3); flex-shrink:0; width:40px; line-height:1.4;
}
.dept-item .dept-name {
  flex:1; min-width:0; font-size:12px; font-weight:600;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.dept-item .dept-pct {
  font-size:11px; font-weight:700; flex-shrink:0;
}
.div-header {
  font-size:9px; font-weight:800; color:var(--text4);
  letter-spacing:1.5px; text-transform:uppercase;
  padding:12px 10px 4px; pointer-events:none;
}

/* ── ASSET TABLE (desktop row mode) ── */
.asset-table { width:100%; border-collapse:collapse; }
.asset-table th {
  padding:8px 12px; text-align:left; font-size:11px; font-weight:700;
  color:var(--text3); text-transform:uppercase; letter-spacing:.5px;
  border-bottom:2px solid var(--border); white-space:nowrap;
  background:var(--bg2); position:sticky; top:0; z-index:2;
  cursor:pointer; user-select:none;
}
.asset-table th:hover { color:var(--text); }
.asset-table th .sort-icon { margin-left:4px; opacity:.5; }
.asset-table th.sorted .sort-icon { opacity:1; color:var(--accent); }
.asset-table td {
  padding:9px 12px; border-bottom:1px solid var(--border);
  font-size:13px; white-space:nowrap; max-width:220px;
  overflow:hidden; text-overflow:ellipsis;
}
.asset-table tr { cursor:pointer; transition:background .1s; }
.asset-table tbody tr:hover { background:var(--bg3)80; }
.asset-table .status-dot {
  width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0;
}
.asset-table .tag-cell { font-weight:700; font-family:monospace; font-size:12px; }

/* ── ASSET CARDS (mobile card mode) ── */
.asset-card {
  display:flex; align-items:stretch;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:10px; overflow:hidden; margin-bottom:6px;
  cursor:pointer; transition:border-color .12s;
}
.asset-card:hover { border-color:var(--accent)80; }
.asset-card .status-bar { width:4px; flex-shrink:0; }
.asset-card .card-content { flex:1; padding:10px 12px; min-width:0; }
.asset-card .card-title {
  font-weight:600; font-size:13px; color:var(--text);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  margin-bottom:3px;
}
.asset-card .card-meta {
  display:flex; gap:8px; font-size:11px; color:var(--text3);
  flex-wrap:wrap; align-items:center;
}
.asset-card .quick-ok {
  padding:0 14px; background:none; border:none; border-left:1px solid var(--border);
  color:var(--text4); cursor:pointer; font-size:20px; flex-shrink:0;
  transition:color .12s;
}
.asset-card .quick-ok:hover { color:var(--green); }

/* ── DETAIL PANEL ── */
#detail-panel {
  background:var(--bg); position:relative;
}
.detail-section {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:10px; padding:16px; margin-bottom:12px;
}
.detail-section h3 {
  font-size:11px; font-weight:700; color:var(--text3);
  text-transform:uppercase; letter-spacing:.5px; margin-bottom:12px;
}
.field-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:480px){ .field-grid { grid-template-columns:1fr; } }
.field-val { font-size:14px; color:var(--text); min-height:20px; }
.field-val.edited { color:var(--amber); }
.field-val.dim { color:var(--text3); }

/* ── STATUS CHIPS ── */
.status-grid { display:grid; gap:6px; }
.status-btn {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px; border-radius:8px; border:2px solid var(--border);
  background:transparent; cursor:pointer; font-size:13px; font-weight:600;
  color:var(--text3); text-align:left; transition:all .12s;
}
.status-btn:hover { border-color:var(--text4); color:var(--text2); }
.status-btn.active { color:var(--active-color) !important; border-color:var(--active-color) !important; background:color-mix(in srgb, var(--active-color) 12%, transparent); }
.status-dot-sm { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* ── FILTER BAR ── */
.filter-bar { display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
.filter-chip {
  padding:4px 11px; border-radius:20px; border:1px solid var(--border);
  background:transparent; cursor:pointer; font-size:11px; font-weight:600;
  color:var(--text3); transition:all .12s; white-space:nowrap;
}
.filter-chip:hover { border-color:var(--text4); color:var(--text2); }
.filter-chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* ── SORT BAR ── */
.sort-bar { display:flex; gap:4px; align-items:center; flex-wrap:wrap; }
.sort-chip {
  padding:3px 8px; border-radius:5px; border:none;
  background:transparent; cursor:pointer; font-size:11px; font-weight:600;
  color:var(--text4); transition:all .12s;
}
.sort-chip:hover { color:var(--text2); }
.sort-chip.active { background:var(--bg3); color:var(--accent); }

/* ── VIEW TOGGLE ── */
.view-toggle { display:flex; background:var(--bg3); border-radius:7px; padding:2px; gap:2px; }
.view-toggle button {
  padding:5px 10px; border-radius:5px; border:none; background:transparent;
  cursor:pointer; font-size:12px; font-weight:600; color:var(--text3);
  transition:all .12s;
}
.view-toggle button.active { background:var(--bg2); color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.2); }

/* ── TOAST ── */
#toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:var(--bg2); border:1px solid var(--border); color:var(--text);
  padding:10px 20px; border-radius:8px; font-size:13px; font-weight:600;
  z-index:999; pointer-events:none; opacity:0; transition:opacity .25s;
  white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,.3);
}
#toast.show { opacity:1; }
#toast.ok  { border-color:var(--green);  color:var(--green2); }
#toast.err { border-color:var(--red);    color:#f87171; }
#toast.info{ border-color:var(--accent); color:var(--accent2); }

/* ── CONFIG BANNER ── */
#cfg-banner {
  background:color-mix(in srgb,var(--amber) 15%,var(--bg2));
  border-bottom:2px solid var(--amber);
  padding:8px 16px; display:none;
  font-size:12px; font-weight:600; color:var(--amber);
  text-align:center; cursor:pointer; flex-shrink:0;
}

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.6);
  z-index:100; display:flex; align-items:center; justify-content:center; padding:16px;
}
.modal {
  background:var(--bg2); border:1px solid var(--border); border-radius:16px;
  padding:28px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto;
}
.modal h2 { font-size:18px; font-weight:700; color:var(--text); margin-bottom:4px; }
.modal .subtitle { font-size:12px; color:var(--text3); margin-bottom:20px; }
.modal-footer { display:flex; gap:8px; margin-top:20px; }

/* ── SETUP STEPS ── */
.setup-step {
  display:flex; gap:12px; align-items:flex-start;
  padding:12px 0; border-bottom:1px solid var(--border);
}
.setup-step:last-child { border-bottom:none; }
.step-num {
  width:24px; height:24px; border-radius:50%; background:var(--accent);
  color:#fff; font-size:12px; font-weight:800; display:flex;
  align-items:center; justify-content:center; flex-shrink:0; margin-top:1px;
}
.step-num.done { background:var(--green); }
.setup-step h4 { font-size:13px; font-weight:700; color:var(--text); margin-bottom:3px; }
.setup-step p  { font-size:12px; color:var(--text3); line-height:1.5; }
.setup-step .step-input { margin-top:8px; }
.copy-block {
  background:var(--bg); border:1px solid var(--border); border-radius:6px;
  padding:8px 12px; font-size:11px; font-family:monospace; color:var(--text2);
  margin-top:6px; word-break:break-all; cursor:pointer; position:relative;
}
.copy-block:hover::after {
  content:'Click to copy'; position:absolute; top:-22px; right:0;
  font-size:10px; background:var(--bg3); padding:2px 6px; border-radius:4px;
  font-family:inherit;
}
.status-indicator { display:flex; align-items:center; gap:6px; font-size:12px; margin-top:6px; }
.dot-status { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dot-status.ok  { background:var(--green); }
.dot-status.err { background:var(--red); }
.dot-status.pending { background:var(--amber); }

/* ── LOGIN ── */
#login-screen {
  position:fixed; inset:0; background:var(--bg);
  display:flex; align-items:center; justify-content:center; padding:24px; z-index:200;
}
.login-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:16px;
  padding:36px 32px; width:100%; max-width:380px;
}
.login-logo {
  text-align:center; margin-bottom:28px;
}
.login-logo .brand {
  display:inline-block; background:var(--brand); color:#fff;
  font-size:15px; font-weight:800; letter-spacing:.5px;
  padding:8px 16px; border-radius:8px; margin-bottom:12px;
}
.login-logo h1 { font-size:20px; font-weight:700; color:var(--text); margin-bottom:4px; }
.login-logo p  { font-size:12px; color:var(--text3); }
#login-error { color:#f87171; font-size:13px; text-align:center; min-height:18px; margin-bottom:8px; }

/* ── SEARCH RESULTS ── */
.search-result-card {
  display:flex; align-items:stretch;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:10px; overflow:hidden; margin-bottom:6px;
  cursor:pointer; transition:border-color .12s;
}
.search-result-card:hover { border-color:var(--accent)80; }
.search-result-card .status-bar { width:4px; flex-shrink:0; }
.search-result-card .card-content { flex:1; padding:10px 12px; min-width:0; }
.search-highlight { background:color-mix(in srgb,var(--amber) 30%,transparent); border-radius:2px; font-weight:700; }

</style>
</head>
<body>

<div id="login-screen" style="display:none"></div>

<div id="shell" style="display:none">
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
  <aside id="sidebar">
    <div id="sidebar-header">
      <div style="background:var(--brand);color:#fff;padding:5px 10px;border-radius:6px;font-size:12px;font-weight:800;letter-spacing:.5px;flex-shrink:0;">CSULB</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:700;color:var(--text);">PI Audit</div>
        <div style="font-size:10px;color:var(--text3);">FY 2025–26</div>
      </div>
    </div>
    <div style="padding:8px 10px 4px;">
      <input class="input" id="dept-search" placeholder="Search departments…" style="font-size:12px;padding:7px 10px;" oninput="renderSidebar()">
    </div>
    <div id="dept-list-wrap"></div>
    <div id="sidebar-footer">
      <div style="flex:1;">
        <div style="font-size:10px;color:var(--text3);margin-bottom:2px;">Overall Progress</div>
        <div class="pbar-wrap"><div class="pbar-fill" id="global-pbar" style="background:var(--accent);width:0%"></div></div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px;" id="global-pct-label">0 / 0 assets</div>
      </div>
    </div>
  </aside>

  <div id="main">
    <div id="cfg-banner" onclick="showSetupModal()">⚠ Google Sheets not connected — progress won't be saved. Tap to set up →</div>
    <div id="topbar">
      <button class="btn icon ghost" id="menu-btn" onclick="toggleSidebar()" style="display:none;">☰</button>
      <div id="topbar-title" style="font-size:15px;font-weight:700;color:var(--text);display:none;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">Select a Department</div>
      <div style="flex:1;min-width:0;position:relative;">
        <input id="global-search" class="input" placeholder="Search tag #, description, serial, location, custodian…"
          style="padding-left:32px;font-size:13px;height:36px;"
          oninput="handleSearch(this.value)">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:14px;">🔍</span>
        <button id="search-clear" onclick="clearSearch()" style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;">✕</button>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">
        <div class="view-toggle" id="view-toggle">
          <button id="vt-card" class="active" onclick="setViewMode('card')" title="Card view">⊞</button>
          <button id="vt-table" onclick="setViewMode('table')" title="Table view">☰</button>
        </div>
        <button class="btn icon ghost" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">◑</button>
        <button class="btn sm ghost" onclick="exportCSV()">Export</button>
        <button class="btn icon ghost" onclick="showSetupModal()" title="Settings">⚙</button>
      </div>
    </div>
    <div id="content">
      <div id="content-inner" id="content-main">
        <div id="main-view"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

function initTheme() {
  const t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').textContent = t==='dark' ? '☀' : '◑';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('theme-btn').textContent = next==='dark' ? '☀' : '◑';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

function deptProgress() {
  const m = {};
  RAW_DATA.forEach(r => {
    if (!m[r.dept]) m[r.dept] = {total:0,done:0};
    m[r.dept].total++;
    if (statuses[r.id]) m[r.dept].done++;
  });
  return m;
}

function renderSidebar() {
  const prog = deptProgress();
  const q = (document.getElementById('dept-search')?.value || '').toLowerCase();
  const wrap = document.getElementById('dept-list-wrap');
  wrap.innerHTML = '';

  const filtered = SORTED_DEPTS.filter(d =>
    !q || d.includes(q) ||
    (DEPT_NAMES[d]||'').toLowerCase().includes(q) ||
    (DEPT_DIV[d]||'').toLowerCase().includes(q)
  );

  let lastDiv = null;
  filtered.forEach(dept => {
    const div_ = DEPT_DIV[dept] || 'Other';
    if (div_ !== lastDiv) {
      const lbl = document.createElement('div');
      lbl.className = 'div-header';
      lbl.textContent = div_;
      wrap.appendChild(lbl);
      lastDiv = div_;
    }
    const p = prog[dept] || {total:DEPT_COUNTS[dept]||0, done:0};
    const pct = p.total ? Math.round(p.done/p.total*100) : 0;
    const name = DEPT_NAMES[dept] || `Dept ${dept}`;
    const done = TRACKER_DATA[dept]?.completed;

    const btn = document.createElement('button');
    btn.className = 'dept-item' + (selectedDept===dept?' active':'');
    btn.innerHTML = `
      <div class="dept-id-badge">
        <div style="font-size:8px;color:var(--text4);">DEPT ID</div>
        <div style="font-weight:700;color:var(--text2);">${dept}</div>
      </div>
      <div style="flex:1;min-width:0;">
        <div class="dept-name" style="color:${done?'var(--green2)':'var(--text)'};">${name}</div>
        <div class="pbar-wrap" style="height:2px;margin-top:3px;">
          <div class="pbar-fill" style="background:${pct===100?'var(--green)':'var(--accent)'};width:${pct}%;"></div>
        </div>
      </div>
      <div class="dept-pct" style="color:${pct===100?'var(--green2)':pct>0?'var(--accent2)':'var(--text4)'};">${pct}%</div>`;
    btn.addEventListener('click', () => {
      selectedDept = dept;
      selectedAsset = null;
      filterStatus = 'all';
      sortBy = 'tagNumber';
      sortDir = 'asc';
      renderSidebar();
      renderMain();
      closeSidebar();
    });
    wrap.appendChild(btn);
  });

  // Global progress
  const total = RAW_DATA.length;
  const done_ = Object.keys(statuses).length;
  const pct_ = Math.round(done_/total*100);
  const pb = document.getElementById('global-pbar');
  if (pb) { pb.style.width = pct_+'%'; pb.style.background = pct_===100?'var(--green)':'var(--accent)'; }
  const lbl = document.getElementById('global-pct-label');
  if (lbl) lbl.textContent = `${done_} / ${total} assets (${pct_}%)`;
}

function getDeptAssets() {
  if (!selectedDept) return [];
  let assets = RAW_DATA.filter(r => r.dept === selectedDept);
  if (filterStatus === 'unreviewed') assets = assets.filter(r => !statuses[r.id]);
  else if (filterStatus !== 'all') assets = assets.filter(r => statuses[r.id] === filterStatus);
  return assets.slice().sort((a,b) => {
    const v = r => { const e=edits[r.id]||{}; return sortBy==='tagNumber'?(e.tagNumber??r.tagNumber):(e[sortBy]??r[sortBy]??''); };
    let av=v(a), bv=v(b);
    if (sortBy==='amount'){av=Number(av);bv=Number(bv);}
    if (av<bv) return sortDir==='asc'?-1:1;
    if (av>bv) return sortDir==='asc'?1:-1;
    return 0;
  });
}

    html += `<button class="sort-chip${sortBy===key?' active':''}" data-sort="${key}">${lbl}${sortBy===key?(sortDir==='asc'?' ↑':' ↓'):''}</button>`;
  });
  html += `</div></div>`;

  // Assets
  if (viewMode === 'table') {
    html += renderAssetTable(assets);
  } else {
    html += `<div id="asset-card-list">`;
    if (assets.length === 0) {
      html += `<div style="color:var(--text3);text-align:center;padding:40px;">No assets match this filter.</div>`;
    }
    assets.forEach(r => { html += renderAssetCardHTML(r); });
    html += `</div>`;
  }

  wrap.innerHTML = html;

  // Bind filter chips
  wrap.querySelectorAll('.filter-chip').forEach(btn => {
    btn.addEventListener('click', () => { filterStatus = btn.dataset.filter; renderMain(); });
  });
  // Bind sort chips
  wrap.querySelectorAll('.sort-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      if (sortBy===btn.dataset.sort) sortDir=sortDir==='asc'?'desc':'asc';
      else { sortBy=btn.dataset.sort; sortDir='asc'; }
      renderMain();
    });
  });
  // Bind table headers
  wrap.querySelectorAll('.asset-table th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      if (sortBy===th.dataset.sort) sortDir=sortDir==='asc'?'desc':'asc';
      else { sortBy=th.dataset.sort; sortDir='asc'; }
      renderMain();
    });
  });
  // Bind card/row clicks
  wrap.querySelectorAll('[data-asset-id]').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.classList.contains('quick-ok')) return;
      const id = parseInt(el.dataset.assetId);
      selectedAsset = RAW_DATA[id];
      showAssetDetail(selectedAsset);
    });
  });
  // Bind quick-ok
  wrap.querySelectorAll('.quick-ok').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = parseInt(btn.closest('[data-asset-id]').dataset.assetId);
      statuses[id] = 'ok';
      saveAsset(id);
      renderMain();
      renderSidebar();
    });
  });
}

function renderAssetTable(assets) {

  <table class="asset-table">

    h += `<tr><td colspan="${cols.length}" style="text-align:center;color:var(--text3);padding:32px;">No assets match this filter.</td></tr>`;
  }

  assets.forEach(r => {
    const ed = edits[r.id]||{};
    const merged = {...r,...ed};
    const st = statuses[r.id];
    const tag = ed.tagNumber??r.tagNumber;
    const tagChanged = ed.tagNumber && ed.tagNumber!==r.tagNumber;
    const stColor = st ? STATUS_COLORS[st] : 'var(--border)';
    h += `<tr data-asset-id="${r.id}" style="border-left:3px solid ${stColor};">
      <td class="tag-cell" style="color:${tagChanged?'var(--amber)':'var(--text)'};">${tag}</td>

let SHEET_ID  = localStorage.getItem('sheetId')  || '';
let API_KEY   = localStorage.getItem('apiKey')    || '';
let WEB_APP_URL = localStorage.getItem('webAppUrl') || '';

async function sheetsGet() {
  if (!SHEET_ID || !API_KEY) return null;
  try {
    const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/AuditProgress!A:K?key=${API_KEY}`);
    if (!r.ok) return null;
    return (await r.json()).values || [];
  } catch { return null; }
}

async function sheetsWrite(rows) {
  if (!WEB_APP_URL) return false;
  try {
    // Use text/plain to avoid CORS preflight — Apps Script receives it fine
    const r = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ rows })
    });
    return r.ok;
  } catch(e) {
    console.error('sheetsWrite error:', e);
    return false;
  }
}

async function sheetsGetUsers() {
  if (!SHEET_ID || !API_KEY) return null;
  try {
    const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Users!A:B?key=${API_KEY}`);
    if (!r.ok) return null;
    return (await r.json()).values || [];
  } catch { return null; }
}

let _saveQueue = {}, _saveTimer = null;
function queueSave(assetId, data) {
  _saveQueue[assetId] = data;
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(flushSave, 1500);
}
async function flushSave() {
  const rows = Object.entries(_saveQueue).map(([assetId,d]) => ({assetId,...d}));
  _saveQueue = {};
  if (!rows.length || !WEB_APP_URL) return;
  showToast('Saving…','info');
  const ok = await sheetsWrite(rows);
  showToast(ok ? 'Saved ✓' : 'Save failed — check Apps Script URL', ok?'ok':'err', ok?2000:4000);
}
function saveAsset(id) {
  const r = RAW_DATA[id];
  if (!r) return;
  const ed = edits[id]||{};
  queueSave(r.assetId, {
    tagNumber:r.tagNumber, dept:r.dept,
    status:statuses[id]||'', notes:notes[id]||'',
    editedTag:ed.tagNumber||'', editedLocation:ed.location||'',
    editedCustodian:ed.custodian||'', editedSerialId:ed.serialId||'',
    editedDescription:ed.description||'', lastUpdated:new Date().toISOString()
  });
}

async function loadFromSheets() {
  showToast('Loading progress…','info');
  const rows = await sheetsGet();
  if (!rows || rows.length < 2) { showToast('No saved progress found','info',2000); return; }
  const hdr = rows[0];
  const idx = {};
  hdr.forEach((h,i) => idx[h]=i);
  statuses={}; notes={}; edits={};
  rows.slice(1).forEach(row => {
    const asset = ASSET_BY_ID[row[idx['assetId']]];
    if (!asset) return;
    const id = asset.id;
    const st=row[idx['status']]||''; if(st) statuses[id]=st;
    const nt=row[idx['notes']]||''; if(nt) notes[id]=nt;
    const eTag=row[idx['editedTag']]||'', eLoc=row[idx['editedLocation']]||'',
          eCust=row[idx['editedCustodian']]||'', eSer=row[idx['editedSerialId']]||'',
          eDesc=row[idx['editedDescription']]||'';
    if(eTag||eLoc||eCust||eSer||eDesc) {
      edits[id]={};
      if(eTag&&eTag!==asset.tagNumber) edits[id].tagNumber=eTag;
      if(eLoc&&eLoc!==asset.location) edits[id].location=eLoc;
      if(eCust&&eCust!==asset.custodian) edits[id].custodian=eCust;
      if(eSer&&eSer!==asset.serialId) edits[id].serialId=eSer;
      if(eDesc&&eDesc!==asset.description) edits[id].description=eDesc;
    }
  });
  showToast('Progress loaded ✓','ok',2500);
  renderSidebar();
  renderMain();
}

async function testConnection() {
  const sheetId = document.getElementById('setup-sheet-id').value.trim();
  const apiKey  = document.getElementById('setup-api-key').value.trim();
  const webUrl  = document.getElementById('setup-web-url').value.trim();
  const statusEl = document.getElementById('conn-status');

  statusEl.innerHTML = '<span class="dot-status pending"></span> Testing…';

  let readOk = false, writeOk = false, readErr = '', writeErr = '';

  // Test read (API key + Sheet ID)
  if (!sheetId || !apiKey) {
    readErr = 'Sheet ID and API Key required';
  } else {
    try {
      const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/AuditProgress!A1?key=${apiKey}`);
      if (r.ok) {
        readOk = true;
      } else {
        const err = await r.json();
        readErr = err.error?.message || ('HTTP ' + r.status);
      }
    } catch(e) {
      readErr = 'Network error';
    }
  }

  // Test write (Apps Script URL) - send a test ping
  if (!webUrl) {
    writeErr = 'No Apps Script URL entered';
  } else {
    try {
      const r = await fetch(webUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ rows: [], _test: true })
      });
      if (r.ok) {
        writeOk = true;
      } else {
        writeErr = 'HTTP ' + r.status;
      }
    } catch(e) {
      writeErr = 'Could not reach Apps Script URL — check URL and deployment settings';
    }
  }

  let html = '';
  html += `<div><span class="dot-status ${readOk?'ok':'err'}"></span> Read (API Key): ${readOk ? '✓ OK' : '✗ ' + readErr}</div>`;
  html += `<div style="margin-top:4px;"><span class="dot-status ${writeOk?'ok':'err'}"></span> Write (Apps Script): ${writeOk ? '✓ OK' : '✗ ' + writeErr}</div>`;
  if (writeErr && writeErr.includes('Apps Script')) {
    html += `<div style="margin-top:6px;font-size:11px;color:var(--text3);">
      💡 Make sure Apps Script is deployed as a Web App: <strong>Execute as: Me</strong>, <strong>Access: Anyone</strong>. After ANY code change, click <strong>Deploy → New deployment</strong> (not "edit existing").
      After any code change you must create a <strong>New Deployment</strong> (not edit existing).
    </div>`;
  }
  statusEl.innerHTML = html;
}

    if (data._test) {
      return makeResponse({status:'ok', test:true});
    }

      return makeResponse({status:'ok', updated:0});
    }

    var ss = SpreadsheetApp.getActiveSpreadsheet();

    if (sheet.getLastRow() === 0) {
      sheet.appendRow(['assetId','tagNumber','dept','status','notes',
        'editedTag','editedLocation','editedCustodian',
        'editedSerialId','editedDescription','lastUpdated']);
    }

    var existing = sheet.getDataRange().getValues();
    var rowIndex = {};
    for (var i = 1; i < existing.length; i++) {
      if (existing[i][0]) rowIndex[existing[i][0]] = i + 1;
    }

    var COLS = ['assetId','tagNumber','dept','status','notes','editedTag',
                'editedLocation','editedCustodian','editedSerialId',
                'editedDescription','lastUpdated'];

    for (var j = 0; j < rows.length; j++) {
      var row = rows[j];
      var vals = COLS.map(function(c) {
        return row[c] !== undefined ? String(row[c]) : '';
      });
      var ei = rowIndex[row.assetId];
      if (ei) {
        sheet.getRange(ei, 1, 1, vals.length).setValues([vals]);
      } else {
        sheet.appendRow(vals);
        rowIndex[row.assetId] = sheet.getLastRow();
      }
    }

    return makeResponse({status:'ok', updated:rows.length});

  } catch(err) {
    return makeResponse({status:'error', message:err.toString()});
  }
}

          <label class="label">Paste your Spreadsheet ID here</label>
          <input class="input" id="setup-sheet-id" value="${SHEET_ID}" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms" style="font-family:monospace;font-size:12px;">
          <p style="font-size:11px;color:var(--text3);margin-top:4px;">Found in the URL: docs.google.com/spreadsheets/d/<strong>THIS_PART</strong>/edit</p>
        </div>
      </div>
    </div>

    <!-- STEP 2 -->
    <div class="setup-step">
      <div class="step-num">2</div>
      <div style="flex:1;">
        <h4>Add the Apps Script (enables saving)</h4>
        <p>In your Sheet: <strong>Extensions → Apps Script</strong>. Replace all code with this, then deploy as a Web App (Execute as: Me, Access: Anyone):</p>
        <div class="copy-block" onclick="copyText(this)" style="max-height:80px;overflow:hidden;">${APPS_SCRIPT.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        <div class="step-input">
          <label class="label">Paste the Web App URL here</label>
          <input class="input" id="setup-web-url" value="${WEB_APP_URL}" placeholder="https://script.google.com/macros/s/…/exec" style="font-family:monospace;font-size:12px;">
        </div>
      </div>
    </div>

    <!-- STEP 3 -->
    <div class="setup-step">
      <div class="step-num">3</div>
      <div style="flex:1;">
        <h4>Get a Google Sheets API Key (enables reading)</h4>
        <p>Go to <a href="https://console.cloud.google.com" target="_blank">console.cloud.google.com</a> → create a project → enable <strong>Google Sheets API</strong> → Credentials → Create API Key.<br>
        Set the sheet to <strong>Anyone with link can view</strong>.</p>
        <div class="step-input">
          <label class="label">Paste your API Key here</label>
          <input class="input" id="setup-api-key" value="${API_KEY}" placeholder="AIzaSy…" style="font-family:monospace;font-size:12px;">
        </div>
      </div>
    </div>

    <!-- TEST -->
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-top:4px;">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <button class="btn sm" onclick="testConnection()">Test Connection</button>
        <div id="conn-status" class="status-indicator" style="font-size:12px;color:var(--text3);">Enter values above, then test.</div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn primary" style="flex:1;" onclick="saveSetup()">Save & Connect</button>
      <button class="btn" onclick="document.getElementById('setup-modal').remove()">Cancel</button>
      <button class="btn" style="color:var(--red);border-color:var(--red)44;" onclick="signOut()">Sign Out</button>
    </div>
  </div>`;

  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
}

function copyText(el) {
  navigator.clipboard.writeText(el.textContent).then(() => showToast('Copied!','ok',1500));
}

async function saveSetup() {
  SHEET_ID    = document.getElementById('setup-sheet-id').value.trim();
  API_KEY     = document.getElementById('setup-api-key').value.trim();
  WEB_APP_URL = document.getElementById('setup-web-url').value.trim();
  localStorage.setItem('sheetId', SHEET_ID);
  localStorage.setItem('apiKey', API_KEY);
  localStorage.setItem('webAppUrl', WEB_APP_URL);
  document.getElementById('setup-modal').remove();
  updateBanner();
  await loadFromSheets();
}

function updateBanner() {
  const b = document.getElementById('cfg-banner');
  if (b) b.style.display = (SHEET_ID && API_KEY && WEB_APP_URL) ? 'none' : 'block';
}

// ═══════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════
const SESSION_KEY = 'piaudit_session';
function getSession() { try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch { return null; } }
function setSession(u) { localStorage.setItem(SESSION_KEY, JSON.stringify({username:u, ts:Date.now()})); }
function signOut() {
  localStorage.removeItem(SESSION_KEY);
  const m = document.getElementById('setup-modal');
  if (m) m.remove();
  showLogin();
}

async function checkCreds(u, p) {
  if (!SHEET_ID || !API_KEY) return u==='admin' && p==='piaudit2025';
  const rows = await sheetsGetUsers();
  if (!rows) return false;
  return rows.slice(1).some(r => (r[0]||'').trim().toLowerCase()===u.toLowerCase() && (r[1]||'').trim()===p);
}

function showLogin() {
  document.getElementById('shell').style.display = 'none';
  const scr = document.getElementById('login-screen');
  scr.style.display = 'flex';
  scr.innerHTML = `
    <div class="login-card">
      <div class="login-logo">
        <div class="brand">CSULB</div>
        <h1>Physical Inventory</h1>
        <p>FY 2025–26 · Property Management Office</p>
      </div>
      <div id="login-error"></div>
      <input class="input" id="login-user" type="text" placeholder="Username" autocomplete="username" autocapitalize="none" spellcheck="false" style="margin-bottom:10px;">
      <input class="input" id="login-pass" type="password" placeholder="Password" autocomplete="current-password" style="margin-bottom:14px;">
      <button class="btn primary" id="login-btn" style="width:100%;padding:12px;font-size:15px;">Sign In</button>
      ${!SHEET_ID?`<p style="font-size:11px;color:var(--text3);text-align:center;margin-top:12px;">No sheet connected — use <strong>admin / piaudit2025</strong></p>`:''}
    </div>`;

  const userInp = document.getElementById('login-user');
  const passInp = document.getElementById('login-pass');
  const loginBtn= document.getElementById('login-btn');
  const errDiv  = document.getElementById('login-error');

  async function attempt() {
    const u=userInp.value.trim(), p=passInp.value;
    if(!u||!p){errDiv.textContent='Enter username and password.';return;}
    loginBtn.disabled=true; loginBtn.textContent='Signing in…'; errDiv.textContent='';
    const ok = await checkCreds(u,p);
    if(ok){
      setSession(u);
      scr.style.display='none';
      document.getElementById('shell').style.display='flex';
      boot();
    } else {
      errDiv.textContent='Incorrect username or password.';
      loginBtn.disabled=false; loginBtn.textContent='Sign In';
      passInp.value=''; passInp.focus();
    }
  }
  loginBtn.addEventListener('click',attempt);
  passInp.addEventListener('keydown',e=>{if(e.key==='Enter')attempt();});
  userInp.addEventListener('keydown',e=>{if(e.key==='Enter')passInp.focus();});
  setTimeout(()=>userInp.focus(),100);
}

// ═══════════════════════════════════════════════
//  EXPORT
// ═══════════════════════════════════════════════
function exportCSV() {
  const rows = ['Asset ID,Tag #,Dept ID,Div,Dept Name,Description,Location,Custodian,Serial ID,Amount,Status,Notes,Edited Fields'];
  RAW_DATA.forEach(r => {
    const st=statuses[r.id]||'', nt=(notes[r.id]||'').replace(/,/g,'；');
    const ed=edits[r.id]||{};
    const eflds=Object.keys(ed).filter(k=>ed[k]!==r[k]).join('|');
    if(st||nt||eflds){
      const m={...r,...ed};
      rows.push([r.assetId,m.tagNumber||r.tagNumber,r.dept,TRACKER_DATA[r.dept]?.div||'',DEPT_NAMES[r.dept]||'',`"${(m.description||'').replace(/"/g,'""')}"`,m.location||'',m.custodian||'',m.serialId||'',r.amount,st,nt,eflds].join(','));
    }
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));
  a.download='PI_FY25-26_Audit.csv'; a.click();
  showToast('CSV exported ✓','ok',2000);
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
let _tt=null;
function showToast(msg,type='',dur=0){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+(type||'');
  clearTimeout(_tt); if(dur) _tt=setTimeout(()=>{t.className='toast';},dur);
}

// ═══════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════
function boot() {
  initTheme();
  updateBanner();
  renderSidebar();
  renderMain();
  if(SHEET_ID&&API_KEY&&WEB_APP_URL) loadFromSheets();
  else document.getElementById('cfg-banner').style.display='block';
}

initTheme();
const _sess = getSession();
if(_sess) {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('shell').style.display='flex';
  boot();
} else {
  showLogin();
}

// ═══════════════════════════════════════════════
//  GLOBAL SEARCH
// ═══════════════════════════════════════════════
let searchQuery = '';
let _searchTimer = null;

function handleSearch(val) {
  searchQuery = val.trim();
  document.getElementById('search-clear').style.display = searchQuery ? 'block' : 'none';
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(renderSearchResults, 120);
}

function clearSearch() {
  searchQuery = '';
  document.getElementById('global-search').value = '';
  document.getElementById('search-clear').style.display = 'none';
  renderMain();
}

function highlight(text, query) {
  if (!query || !text) return text || '—';
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return String(text).replace(new RegExp('(' + escaped + ')', 'gi'), '<mark class="search-highlight">$1</mark>');
}

function getSearchResults(q) {
  const ql = q.toLowerCase();
  return RAW_DATA.filter(r => {
    const ed = edits[r.id] || {};
    const tag = ed.tagNumber ?? r.tagNumber ?? '';
    return tag.toLowerCase().includes(ql) ||
      (r.assetId || '').includes(ql) ||
      (r.description || '').toLowerCase().includes(ql) ||
      (r.serialId || '').toLowerCase().includes(ql) ||
      (r.location || '').toLowerCase().includes(ql) ||
      (r.custodian || '').toLowerCase().includes(ql) ||
      (r.dept || '').includes(ql) ||
      (DEPT_NAMES[r.dept] || '').toLowerCase().includes(ql);
  }).slice(0, 80);
}

function renderSearchResults() {
  const wrap = document.getElementById('main-view');
  if (!wrap) return;

  if (!searchQuery) { renderMain(); return; }

  const results = getSearchResults(searchQuery);
  const q = searchQuery;

  let h = `<div style="margin-bottom:12px;">
    <span style="font-size:13px;font-weight:600;color:var(--text2);">${results.length} result${results.length!==1?'s':''} for "<span style="color:var(--accent);">${q}</span>"</span>
    ${results.length===80?`<span style="font-size:11px;color:var(--text3);margin-left:8px;">(showing first 80)</span>`:''}
  </div>`;

  if (results.length === 0) {
    h += `<div style="text-align:center;padding:60px 24px;color:var(--text3);">
      <div style="font-size:32px;margin-bottom:12px;">🔍</div>
      <div style="font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px;">No results found</div>
      <div style="font-size:13px;">Try searching by tag number, description, serial ID, location, or custodian.</div>
    </div>`;
  } else {
    results.forEach(r => {
      const ed = edits[r.id] || {};
      const merged = {...r, ...ed};
      const st = statuses[r.id];
      const tag = ed.tagNumber ?? r.tagNumber;
      const stColor = st ? STATUS_COLORS[st] : 'var(--border)';
      const dName = DEPT_NAMES[r.dept] || '';

      h += `<div class="search-result-card" data-asset-id="${r.id}">
        <div class="status-bar" style="background:${stColor};"></div>
        <div class="card-content">
          <div class="card-title" style="margin-bottom:4px;">${highlight(merged.description, q)}</div>
          <div class="card-meta" style="display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--text3);">
            <span>Tag <strong style="color:var(--text2);">${highlight(tag, q)}</strong></span>
            <span style="color:var(--text4);">·</span>
            <span>Dept ID <strong>${r.dept}</strong>${dName ? ' – '+highlight(dName,q) : ''}</span>
            ${merged.location ? `<span style="color:var(--text4);">·</span><span>${highlight(merged.location, q)}</span>` : ''}
            ${merged.custodian ? `<span style="color:var(--text4);">·</span><span style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${highlight(merged.custodian.split(',').reverse().join(' '), q)}</span>` : ''}
            ${merged.serialId ? `<span style="color:var(--text4);">·</span><span style="font-family:monospace;">${highlight(merged.serialId, q)}</span>` : ''}
            <span style="margin-left:auto;color:var(--green);font-weight:600;">$${Number(r.amount).toLocaleString('en-US',{maximumFractionDigits:0})}</span>
          </div>
          ${st ? `<div style="margin-top:4px;font-size:11px;font-weight:700;color:${STATUS_COLORS[st]};">${STATUS_LABELS[st]}</div>` : ''}
        </div>
      </div>`;
    });
  }

  wrap.innerHTML = h;

  // Bind clicks
  wrap.querySelectorAll('[data-asset-id]').forEach(el => {
    el.addEventListener('click', () => {
      const id = parseInt(el.dataset.assetId);
      const asset = RAW_DATA[id];
      selectedAsset = asset;
      selectedDept = asset.dept;
      showAssetDetail(asset);
    });
  });
}
